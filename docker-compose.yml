version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: aitc-mongo
    environment:
      MONGO_INITDB_DATABASE: aitc
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: aitc-backend
    environment:
      MONGODB_URI: mongodb://mongo:27017/aitc
      APP_ENV: development
      CORS_ORIGINS: http://localhost:5173
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: aitc-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
